name: CI

on:
  workflow_dispatch:
  push:
    branches: ['**']
  pull_request:

permissions:
  issues: write
  pull-requests: write

jobs:
  setup:
    name: Setup repo + Node
    runs-on: ubuntu-latest
    outputs:
      node-version: ${{ steps.set-node.outputs.node-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Node version
        id: set-node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: game-rules-system-mcp/package-lock.json

      - name: Verify environment
        run: |
          node --version
          npm --version

  game-rules-system-mcp:
    name: Build & test game-rules-system-mcp
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        test-suite: [unit, integration, e2e]
    steps:
      - name: Use workspace
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: game-rules-system-mcp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./game-rules-system-mcp

      - name: Build
        run: npm run build
        working-directory: ./game-rules-system-mcp

      - name: Run tests (${{ matrix.test-suite }})
        run: npm run test:${{ matrix.test-suite }}
        working-directory: ./game-rules-system-mcp
        timeout-minutes: 10

      - name: Generate coverage report
        if: matrix.test-suite == 'unit'
        run: |
          mkdir -p .test-coverage
          npm run test:coverage | tee .test-coverage/report.txt
        working-directory: ./game-rules-system-mcp

      - name: Upload coverage
        if: matrix.test-suite == 'unit' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: game-rules-system-mcp/.test-coverage/
          retention-days: 7

  game-viewer:
    name: Build game-viewer
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Use workspace
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: game-viewer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./game-viewer

      - name: Build
        run: npm run build
        working-directory: ./game-viewer
